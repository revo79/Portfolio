    body { font-family: -apple-system, 'SF Pro Display', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    .price-status { font-size: 0.6rem; color: var(--muted); margin-top: 2px; }
    .nav { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 72px; z-index: 40; overflow-x: auto; scrollbar-width: none; }

    .nav-btn { flex: 1; min-width: 75px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 11px 6px; font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .nav-btn.active { border-bottom-color: var(--gold); color: var(--gold); }
    .content { padding: 16px 14px calc(var(--safe-bottom) + 16px); max-width: 900px; margin: 0 auto; }
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; position: relative; overflow: hidden; }
    .kpi-label { font-size: 0.52rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }

    .kpi-sub { font-size: 0.62rem; color: var(--muted); }
    .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .split-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .split-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 10px; }

    .split-row-label { font-size: 0.57rem; color: var(--muted); text-transform: uppercase; }
    .split-row-val { font-size: 0.72rem; font-weight: 600; }
    .perf-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .perf-title { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
    .perf-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .perf-row:last-child { border-bottom: none; }
    .perf-name { font-size: 0.78rem; color: #cbd5e1; }
    .perf-pct { font-size: 0.82rem; font-weight: 700; }

    .filter-btns { display: flex; gap: 5px; }
    .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 5px 10px; font-size: 0.62rem; cursor: pointer; }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); background: #1e2535; }
    .add-btn { background: var(--gold); border: none; border-radius: 6px; padding: 7px 12px; font-size: 0.68rem; font-weight: 700; color: var(--bg); cursor: pointer; }
    .inv-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 9px; }

    .legend { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }

    .div-date { font-size: 0.6rem; color: var(--muted); margin-top: 1px; }

</head>

<div class="modal-overlay" id="modal-pos" style="display:none" onclick="if(event.target.id==='modal-pos')closeModal('modal-pos')">

    <div class="form-grid">

      <div class="form-group"><label class="form-label">Anzahl Stück</label><input class="form-input" id="f-stueck" type="number" step="0.0001" /></div>

      <button class="btn-cancel" onclick="closeModal('modal-pos')">Abbrechen</button>
      <button class="btn-save" onclick="savePosition()">Speichern</button>
    </div>
  </div>
</div>

<!-- Dividende Modal -->
<div class="modal-overlay" id="modal-div" style="display:none" onclick="if(event.target.id==='modal-div')closeModal('modal-div')">
  <div class="modal">
    <div class="modal-title">Dividende erfassen</div>
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">Wertpapier</label>
        <select class="form-select" id="fd-position"></select>
      </div>
      <div class="form-group"><label class="form-label">Datum</label><input class="form-input" id="fd-datum" type="date" /></div>
      <div class="form-group"><label class="form-label">Brutto (€)</label><input class="form-input" id="fd-brutto" type="number" step="0.01" placeholder="120.00" /></div>
      <div class="form-group"><label class="form-label">Steuer (€)</label><input class="form-input" id="fd-steuer" type="number" step="0.01" placeholder="0" /></div>
      <div class="form-group"><label class="form-label">Netto (€)</label><input class="form-input" id="fd-netto" type="number" step="0.01" placeholder="wird berechnet" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-div')">Abbrechen</button>
      <button class="btn-save" onclick="saveDividende()">Speichern</button>
    </div>
  </div>
</div>

function calcYears(d) { return (TODAY - new Date(d)) / (1000*60*60*24*365.25); }

function getDividendenFuerPosition(posId) {
  return dividenden.filter(d => d.posId === posId);
}

function getTotalDividenden(posId) {
  return getDividendenFuerPosition(posId).reduce((s, d) => s + d.brutto, 0);
}

function getAktuellerWert(inv) {
  const p = prices[inv.ticker];
  if (p && inv.stueck) return p.price * inv.stueck;
  return 0;
}

function enrich(inv) {
  const aktuellerWert = getAktuellerWert(inv);
  const dividendenTotal = getTotalDividenden(inv.id);
  const total = aktuellerWert + inv.verkaufe + dividendenTotal;
  const gesamtPct = inv.investiert > 0 ? (total - inv.investiert) / inv.investiert * 100 : 0;
  const years = calcYears(inv.kaufDatum);
  const paPct = inv.investiert > 0 && years > 0.05
    ? (Math.pow(total / inv.investiert, 1/years) - 1) * 100
    : gesamtPct;
  return { ...inv, aktuellerWert, dividenden: dividendenTotal, total, gesamtPct, paPct, years };
}

const fmt = n => (n||0).toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
const fmtPct = n => (n>=0?'+':'') + (n||0).toFixed(1) + '%';
const col = n => n >= 0 ? 'var(--green)' : 'var(--red)';

function stats(list) {
  return {
    investiert: list.reduce((s,i) => s+i.investiert, 0),
    aktuellerWert: list.reduce((s,i) => s+i.aktuellerWert, 0),
    verkaufe: list.reduce((s,i) => s+i.verkaufe, 0),

}

/* ---- RENDITE ---- */
function calcPeriodReturn(inv, mode) {
  const aktWert = getAktuellerWert(inv);
  const divTotal = getTotalDividenden(inv.id);
  const kursGewinn = aktWert + inv.verkaufe - inv.investiert;
  const kursGewinnPct = inv.investiert > 0 ? kursGewinn / inv.investiert * 100 : 0;
  const divPct = inv.investiert > 0 ? divTotal / inv.investiert * 100 : 0;
  const years = calcYears(inv.kaufDatum);
  const months = years * 12;
  const totalPct = kursGewinnPct + divPct;

  const divisor = mode === 'jahr' ? Math.max(years, 0.05) : Math.max(months, 0.5);
  const baseFactor = inv.investiert > 0 ? (aktWert + inv.verkaufe + divTotal) / inv.investiert : 1;
  const exp = mode === 'jahr' ? 1/Math.max(years,0.05) : 1/Math.max(months,0.5);
  const cagr = (Math.pow(baseFactor, exp) - 1) * 100;

  const total2 = Math.abs(kursGewinnPct) + Math.abs(divPct);
  const kursFrac = total2 > 0 ? Math.abs(kursGewinnPct)/total2 : 1;
  const divFrac  = total2 > 0 ? Math.abs(divPct)/total2 : 0;

  return {
    total: cagr,
    kurs: cagr >= 0 ? cagr * kursFrac : cagr,
    div:  cagr >= 0 ? cagr * divFrac  : 0,
    isNeg: cagr < 0,
    years, months
  };
}

function renderRendite() {
  const withCalc = data.map(inv => ({ ...inv, ...calcPeriodReturn(inv, renditeMode) }));
  const sorted = [...withCalc].sort((a,b) => b.total - a.total);
  const maxVal = Math.max(...sorted.map(i => Math.abs(i.total)), 1);
  const periodLabel = renditeMode==='jahr' ? 'p.a.' : 'pro Monat';

  const bars = sorted.map(inv => {
    const w = Math.min(Math.abs(inv.total)/maxVal*100, 100);
    const kW = inv.total>0 ? (Math.abs(inv.kurs)/Math.abs(inv.total))*w : 0;
    const dW = inv.total>0 ? (Math.abs(inv.div) /Math.abs(inv.total))*w : 0;
    return `<div class="bar-row">
      <div class="bar-name">${inv.name}</div>
      <div class="bar-track">
        <div class="bar-stacked">
          ${inv.isNeg
            ? `<div class="bar-seg-neg" style="width:${w}%"></div>`
            : `<div class="bar-seg-kurs" style="width:${kW}%"></div><div class="bar-seg-div" style="width:${dW}%"></div>`}
        </div>
        <div class="bar-labels">
          ${inv.isNeg
            ? `<span class="bar-label-item" style="color:var(--red)">${inv.total.toFixed(2)}%</span>`
            : `${inv.kurs>0?`<span class="bar-label-item" style="color:var(--green)">Kurs: ${inv.kurs.toFixed(2)}%</span>`:''}
               ${inv.div>0?`<span class="bar-label-item" style="color:var(--gold)">Div: ${inv.div.toFixed(2)}%</span>`:''}`}
        </div>
      </div>
      <div class="bar-pct" style="color:${col(inv.total)}">${fmtPct(inv.total)}</div>
    </div>`;
  }).join('');

  const aktien = withCalc.filter(i=>i.typ==='Aktie');
  const etfs   = withCalc.filter(i=>i.typ==='ETF');
  const avgA = aktien.reduce((s,i)=>s+i.total,0)/(aktien.length||1);
  const avgE = etfs.reduce((s,i)=>s+i.total,0)/(etfs.length||1);
  const best = sorted[0];

  document.getElementById('tab-rendite').innerHTML = `
    <div class="toggle-row">
      <button class="toggle-btn ${renditeMode==='monat'?'active':''}" onclick="setRenditeMode('monat')">Monat</button>
      <button class="toggle-btn ${renditeMode==='jahr'?'active':''}"  onclick="setRenditeMode('jahr')">Jahr</button>
    </div>
    <div class="period-hint">${renditeMode==='jahr'?'Annualisierte Rendite (CAGR)':'Monatliche Rendite (CMGR)'} — Kurssteigerung (grün) + Dividenden (gold)</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Kurssteigerung</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Dividenden</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Verlust</div>
    </div>
    <div class="perf-card" style="padding:18px 14px">${bars}</div>
    <div class="stat-grid-2">
      <div class="stat-card"><div class="stat-card-label">Ø Aktien ${periodLabel}</div><div class="stat-card-val" style="color:var(--purple)">${fmtPct(avgA)}</div></div>
      <div class="stat-card"><div class="stat-card-label">Ø ETFs ${periodLabel}</div><div class="stat-card-val" style="color:var(--orange)">${fmtPct(avgE)}</div></div>
      <div class="stat-card" style="grid-column:1/-1"><div class="stat-card-label">Beste Position ${periodLabel}</div>
        <div class="stat-card-val" style="color:var(--green)">${best?.name}</div>
        <div class="stat-card-sub" style="color:var(--green)">${fmtPct(best?.total)} ${periodLabel}</div>
      </div>
    </div>`;
}

          <div class="div-amount-net">Netto: ${fmt(d.netto)} | Steuer: ${fmt(d.steuer)}</div>
        </div>
        <button onclick="deleteDiv(${d.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;padding:0 0 0 8px">✕</button>
      </div>`;
    }).join('');
    return `<div class="div-year-section">
      <div class="div-year-title"><span>${y}</span><span style="color:var(--gold)">${fmt(yearTotal)}</span></div>
      ${rows}
    </div>`;
  }).join('');

  document.getElementById('tab-dividenden').innerHTML = `
    <div class="div-summary-card">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div><div class="kpi-label">Gesamt Brutto</div><div style="font-size:0.95rem;font-weight:700;color:var(--gold)">${fmt(gesamtDiv)}</div></div>
        <div><div class="kpi-label">Gesamt Netto</div><div style="font-size:0.95rem;font-weight:700;color:var(--green)">${fmt(gesamtNetto)}</div></div>
        <div><div class="kpi-label">Steuern</div><div style="font-size:0.95rem;font-weight:700;color:var(--red)">${fmt(gesamtSteuer)}</div></div>
      </div>
      <div style="font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px">Jährliche Dividenden</div>
      ${summaryBars}
    </div>
    <button class="div-add-btn" onclick="openDivModal(null)">+ Dividende erfassen</button>
    ${sections}`;
}

/* ---- DETAIL PANEL ---- */
function toggleDetail(id, btn) {
  const panel = document.getElementById('detail-' + id);
  const arrow = document.getElementById('arrow-' + id);
  if (!panel) return;
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    panel.style.display = 'none';
    arrow.textContent = '▼';
    expandedCards.delete(id);
  } else {
    panel.classList.add('open');
    panel.style.display = 'block';
    arrow.textContent = '▲';
    expandedCards.add(id);
  }
}

function fmtMarketCap(n) {
  if (!n) return '—';
  if (n >= 1e12) return (n/1e12).toFixed(2) + ' Bio. $';
  if (n >= 1e9)  return (n/1e9).toFixed(1)  + ' Mrd. $';
  if (n >= 1e6)  return (n/1e6).toFixed(1)  + ' Mio. $';
  return n.toLocaleString('de-DE') + ' $';
}

function fmtRevenue(n) {
  if (!n) return '—';
  if (n >= 1e9)  return (n/1e9).toFixed(1)  + ' Mrd. $';
  if (n >= 1e6)  return (n/1e6).toFixed(1)  + ' Mio. $';
  return n.toLocaleString('de-DE') + ' $';
}

function renderDetailPanel(inv) {
  const f = fundamentals[inv.ticker];
  const e = earnings[inv.ticker];

  if (!f) return '<div style="text-align:center;padding:14px;font-size:0.7rem;color:var(--muted)">⏳ Daten werden morgen geladen</div>';

  const kgvColor = f.pe > 0 && f.pe < 15 ? 'var(--green)' : f.pe > 30 ? 'var(--red)' : 'var(--text)';
  const recColor = f.rating === 'Strong Buy' || f.rating === 'Buy' ? 'var(--green)'
                 : f.rating === 'Sell' || f.rating === 'Strong Sell' ? 'var(--red)' : 'var(--gold)';

  const total = (f.buy||0) + (f.hold||0) + (f.sell||0);
  const buyW  = total > 0 ? (f.buy||0)/total*100 : 0;
  const holdW = total > 0 ? (f.hold||0)/total*100 : 0;
  const sellW = total > 0 ? (f.sell||0)/total*100 : 0;

  const earningsRows = e && e.length > 0
    ? e.slice(0,3).map(function(r) {
        const hitColor = r.actual != null ? (r.actual >= (r.estimate||0) ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
        const epsText  = r.actual != null ? r.actual.toFixed(2) + ' $' : '—';
        return '<div class="earnings-row"><span style="color:var(--muted)">' + r.date + '</span>'
             + '<span style="font-weight:600">' + r.label + '</span>'
             + '<span style="color:' + hitColor + '">' + epsText + '</span></div>';
      }).join('')
    : '<div style="font-size:0.68rem;color:var(--muted)">Keine Daten</div>';

  const analystBar = total > 0
    ? '<div class="analyst-bar">'
      + '<div class="analyst-buy"  style="width:' + buyW  + '%"></div>'
      + '<div class="analyst-hold" style="width:' + holdW + '%"></div>'
      + '<div class="analyst-sell" style="width:' + sellW + '%"></div>'
      + '</div>'
      + '<div class="analyst-counts">'
      + '<span style="color:var(--green)">Kaufen: ' + (f.buy||0) + '</span>'
      + '<span style="color:var(--gold)">Halten: '  + (f.hold||0)+ '</span>'
      + '<span style="color:var(--red)">Verkaufen: '+ (f.sell||0)+ '</span>'
      + '</div>'
    : '';

  return ''
    + '<div class="detail-grid">'
    +   '<div class="detail-item">'
    +     '<div class="detail-label">KGV (P/E)</div>'
    +     '<div class="detail-val" style="color:' + kgvColor + '">' + (f.pe ? f.pe.toFixed(1) : '—') + '</div>'
    +   '</div>'
    +   '<div class="detail-item">'
    +     '<div class="detail-label">Marktkapitalisierung</div>'
    +     '<div class="detail-val">' + fmtMarketCap(f.marketCap) + '</div>'
    +   '</div>'
    +   '<div class="detail-item">'
    +     '<div class="detail-label">Umsatz (letztes Jahr)</div>'
    +     '<div class="detail-val">' + fmtRevenue(f.revenue) + '</div>'
    +   '</div>'
    +   '<div class="detail-item">'
    +     '<div class="detail-label">Nettogewinn</div>'
    +     '<div class="detail-val" style="color:' + (f.netIncome > 0 ? 'var(--green)' : 'var(--red)') + '">' + fmtRevenue(f.netIncome) + '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="analyst-wrap">'
    +   '<div class="detail-label">Analystenempfehlung</div>'
    +   '<div class="detail-val" style="color:' + recColor + ';margin-top:3px">' + (f.rating || '—') + '</div>'
    +   analystBar
    + '</div>'
    + '<div class="earnings-wrap">'
    +   '<div class="earnings-title">Earnings / Quartalstermine</div>'
    +   earningsRows
    + '</div>';
}

/* ---- NAV ---- */
function showTab(tab) {
  activeTab = tab;
  ['dashboard','portfolio','rendite','dividenden'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  document.querySelectorAll('.nav-btn').forEach((btn,i) => {
    btn.classList.toggle('active', ['dashboard','portfolio','rendite','dividenden'][i]===tab);
  });
  renderActive();
}

function renderActive() {
  if (activeTab==='dashboard') renderDashboard();
  else if (activeTab==='portfolio') renderPortfolio();
  else if (activeTab==='rendite') renderRendite();
  else renderDividenden();
}

function setFilter(t) { filterTyp=t; renderPortfolio(); }
function setSort(k) {
  if (sortKey===k) sortAsc=!sortAsc; else { sortKey=k; sortAsc=false; }
  renderPortfolio();
}

/* ---- POSITION MODAL ---- */
function openNewPos() {
  editPosId=null;
  document.getElementById('modal-pos-title').textContent='Neue Position';
  ['name','wkn','ticker','investiert','stueck','verkaufe'].forEach(k => { const e=document.getElementById('f-'+k); if(e) e.value=''; });
  document.getElementById('f-typ').value='Aktie';
  document.getElementById('f-datum').value=new Date().toISOString().slice(0,10);
  document.getElementById('modal-pos').style.display='flex';
}

function openEditPos(id) {
  const inv=data.find(i=>i.id===id); if(!inv) return;
  editPosId=id;
  document.getElementById('modal-pos-title').textContent='Position bearbeiten';
  document.getElementById('f-name').value=inv.name;
  document.getElementById('f-wkn').value=inv.wkn||'';
  document.getElementById('f-ticker').value=inv.ticker||'';
  document.getElementById('f-typ').value=inv.typ;
  document.getElementById('f-datum').value=inv.kaufDatum;
  document.getElementById('f-investiert').value=inv.investiert;
  document.getElementById('f-stueck').value=inv.stueck||'';
  document.getElementById('f-verkaufe').value=inv.verkaufe||0;
  document.getElementById('modal-pos').style.display='flex';
}

function savePosition() {
  const name=document.getElementById('f-name').value.trim();
  const datum=document.getElementById('f-datum').value;
  if(!name||!datum) return;
  const entry = {
    name, wkn:document.getElementById('f-wkn').value.trim(),
    ticker:document.getElementById('f-ticker').value.trim(),
    typ:document.getElementById('f-typ').value, kaufDatum:datum,
    investiert:parseFloat(document.getElementById('f-investiert').value)||0,
    stueck:parseFloat(document.getElementById('f-stueck').value)||0,
    verkaufe:parseFloat(document.getElementById('f-verkaufe').value)||0,
  };
  if(editPosId) { data=data.map(i=>i.id===editPosId?{...entry,id:editPosId}:i); }
  else { data.push({...entry,id:Date.now()}); }
  savePos(); closeModal('modal-pos'); renderActive(); showToast('✓ Gespeichert');
}

function deletePos(id) {
  if(!confirm('Position und alle Dividenden löschen?')) return;
  data=data.filter(i=>i.id!==id);
  dividenden=dividenden.filter(d=>d.posId!==id);
  savePos(); saveDiv(); renderPortfolio(); showToast('Gelöscht');
}

/* ---- DIVIDENDE MODAL ---- */
function openDivModal(posId) {
  const sel=document.getElementById('fd-position');
  sel.innerHTML=data.map(p=>`<option value="${p.id}" ${p.id===posId?'selected':''}>${p.name}</option>`).join('');
  document.getElementById('fd-datum').value=new Date().toISOString().slice(0,10);
  document.getElementById('fd-brutto').value='';
  document.getElementById('fd-steuer').value='';
  document.getElementById('fd-netto').value='';
  document.getElementById('modal-div').style.display='flex';
}

document.addEventListener('input', e => {
  if(e.target.id==='fd-brutto'||e.target.id==='fd-steuer') {
    const b=parseFloat(document.getElementById('fd-brutto').value)||0;
    const s=parseFloat(document.getElementById('fd-steuer').value)||0;
    document.getElementById('fd-netto').value=(b-s).toFixed(2);
  }
});

function saveDividende() {
  const posId=parseInt(document.getElementById('fd-position').value);
  const datum=document.getElementById('fd-datum').value;
  const brutto=parseFloat(document.getElementById('fd-brutto').value)||0;
  const steuer=parseFloat(document.getElementById('fd-steuer').value)||0;
  if(!datum||brutto<=0) return;
  dividenden.push({ id:Date.now(), posId, datum, brutto, steuer, netto:brutto-steuer });
  saveDiv(); closeModal('modal-div'); renderActive(); showToast('✓ Dividende erfasst');
}

function deleteDiv(id) {
  dividenden=dividenden.filter(d=>d.id!==id);
  saveDiv(); renderDividenden(); showToast('Gelöscht');
}

function closeModal(id) { document.getElementById(id).style.display='none'; }

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ---- INIT ---- */
initPrices();
renderDashboard();
</script>
