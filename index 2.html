<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Portfolio" />
  <meta name="theme-color" content="#1a1d2e" />
  <title>Portfolio Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #1a1d2e;
      --bg2: #1f2333;
      --surface: #252a3d;
      --surface2: #2d3348;
      --border: #353b55;
      --border2: #404660;
      --text: #e8ecf4;
      --text2: #b0b8cc;
      --muted: #7a849a;
      --gold: #f0c060;
      --gold2: #f5d080;
      --green: #4cd9a0;
      --green2: #2ebd84;
      --red: #ff7070;
      --red2: #e85555;
      --blue: #6ab0f5;
      --blue2: #4a90e2;
      --purple: #a78bfa;
      --orange: #fb923c;
      --teal: #2dd4bf;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #1f2440 0%, #252b42 100%);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 16px) 18px 14px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .header-inner { display: flex; justify-content: space-between; align-items: center; }
    .header-label { font-size: 0.52rem; letter-spacing: 0.25em; color: var(--gold); text-transform: uppercase; margin-bottom: 3px; font-weight: 500; }
    .header-title { font-size: 1.25rem; font-weight: 300; letter-spacing: -0.02em; }
    .header-title span { color: var(--gold); font-weight: 600; }
    .header-right { text-align: right; }
    .price-status { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
    .total-val { font-size: 1.1rem; font-weight: 700; color: var(--green); }

    /* FAMILY TABS */
    .family-nav {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      position: sticky; top: 73px; z-index: 45;
    }
    .family-nav::-webkit-scrollbar { display: none; }
    .family-btn {
      flex-shrink: 0;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 10px 14px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .family-btn.active { border-bottom-color: var(--gold); color: var(--gold); }
    .family-btn:hover:not(.active) { color: var(--text2); }

    /* NAV */
    .nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky; top: 113px; z-index: 40;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      flex: 1; min-width: 70px;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 10px 6px;
      font-size: 0.6rem; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer;
      font-family: inherit; white-space: nowrap;
      transition: all 0.2s;
    }
    .nav-btn.active { border-bottom-color: var(--teal); color: var(--teal); }

    /* CONTENT */
    .content { padding: 16px 14px calc(var(--safe-bottom) + 20px); max-width: 900px; margin: 0 auto; }

    /* KPI GRID */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 12px;
      position: relative; overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .kpi-card.blue::before { background: linear-gradient(90deg, var(--blue), var(--purple)); }
    .kpi-card.green::before { background: linear-gradient(90deg, var(--green), var(--teal)); }
    .kpi-card.gold::before { background: linear-gradient(90deg, var(--gold), var(--orange)); }
    .kpi-card.dynamic::before { background: linear-gradient(90deg, var(--green), var(--green2)); }
    .kpi-label { font-size: 0.5rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
    .kpi-value { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }
    .kpi-sub { font-size: 0.6rem; color: var(--muted); }

    /* SPLIT CARDS */
    .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .split-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
    .split-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 10px; }
    .split-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .split-row-label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .split-row-val { font-size: 0.72rem; font-weight: 600; }

    /* PERF CARD */
    .perf-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .perf-title { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; font-weight: 500; }
    .perf-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .perf-row:last-child { border-bottom: none; }
    .perf-name { font-size: 0.78rem; color: var(--text2); }
    .perf-pct { font-size: 0.82rem; font-weight: 700; }

    /* FILTER */
    .filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
    .filter-btns { display: flex; gap: 5px; }
    .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 5px 11px; font-size: 0.62rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240,192,96,0.08); }
    .add-btn { background: var(--gold); border: none; border-radius: 8px; padding: 7px 14px; font-size: 0.68rem; font-weight: 700; color: var(--bg); cursor: pointer; font-family: inherit; }

    /* INVESTMENT CARDS */
    .inv-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px; margin-bottom: 9px; }
    .inv-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .inv-name { font-size: 0.88rem; font-weight: 600; }
    .inv-meta { font-size: 0.57rem; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
    .inv-badge { font-size: 0.56rem; padding: 3px 8px; border-radius: 6px; white-space: nowrap; font-weight: 600; letter-spacing: 0.05em; }

    .inv-price-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; padding: 9px 11px;
      background: var(--bg2); border-radius: 10px; flex-wrap: wrap;
    }
    .inv-price { font-size: 1rem; font-weight: 700; font-family: 'DM Mono', monospace; }
    .inv-price-change { font-size: 0.72rem; font-weight: 600; }
    .inv-price-label { font-size: 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }

    .inv-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .inv-stat-label { font-size: 0.5rem; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.06em; }
    .inv-stat-val { font-size: 0.75rem; font-weight: 600; font-family: 'DM Mono', monospace; }

    /* KAUFHISTORIE */
    .kaufhistorie { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .kauf-title { font-size: 0.52rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
    .kauf-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(53,59,85,0.5); font-size: 0.68rem; }
    .kauf-row:last-child { border-bottom: none; }
    .kauf-avg { display: flex; align-items: center; gap: 8px; margin-top: 7px; padding: 6px 10px; background: var(--bg2); border-radius: 8px; }
    .kauf-avg-label { font-size: 0.52rem; color: var(--muted); text-transform: uppercase; flex: 1; }
    .kauf-avg-val { font-size: 0.8rem; font-weight: 700; font-family: 'DM Mono', monospace; }

    .inv-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .inv-action-btn { flex: 1; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 6px; font-size: 0.65rem; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .inv-action-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* DETAIL PANEL */
    .inv-detail-toggle { width:100%; background:none; border:none; border-top: 1px solid var(--border); color:var(--muted); padding:8px 0 0; font-size:0.6rem; cursor:pointer; display:flex; justify-content:center; align-items:center; gap:5px; font-family:inherit; letter-spacing:0.08em; margin-top:10px; transition: color 0.2s; }
    .inv-detail-toggle:hover { color: var(--gold); }
    .inv-detail-panel { display:none; margin-top:10px; border-top:1px solid var(--border); padding-top:12px; }
    .inv-detail-panel.open { display:block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    .detail-item { background:var(--bg2); border-radius:9px; padding:9px 10px; }
    .detail-label { font-size:0.5rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:3px; }
    .detail-val { font-size:0.8rem; font-weight:600; font-family:'DM Mono',monospace; }
    .analyst-wrap { background:var(--bg2); border-radius:9px; padding:9px 10px; margin-bottom:9px; }
    .analyst-bar { display:flex; height:7px; border-radius:4px; overflow:hidden; margin:7px 0 5px; }
    .analyst-buy { background:var(--green); }
    .analyst-hold { background:var(--gold); }
    .analyst-sell { background:var(--red); }
    .analyst-counts { display:flex; justify-content:space-between; font-size:0.55rem; color:var(--muted); }
    .earnings-wrap { background:var(--bg2); border-radius:9px; padding:9px 10px; }
    .earnings-title { font-size:0.5rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
    .earnings-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--border); font-size:0.7rem; }
    .earnings-row:last-child { border-bottom:none; }

    /* RENDITE */
    .toggle-row { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 3px; margin-bottom: 14px; width: fit-content; }
    .toggle-btn { background: none; border: none; border-radius: 7px; padding: 6px 16px; font-size: 0.68rem; cursor: pointer; color: var(--muted); font-family: inherit; transition: all 0.2s; }
    .toggle-btn.active { background: var(--gold); color: var(--bg); font-weight: 700; }
    .legend { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.62rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .bar-row { display: flex; align-items: center; margin-bottom: 13px; gap: 8px; }
    .bar-name { font-size: 0.63rem; color: var(--text2); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; width: 110px; }
    .bar-track { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .bar-stacked { display: flex; height: 12px; border-radius: 4px; overflow: hidden; background: var(--bg2); width: 100%; }
    .bar-seg-kurs { height: 100%; background: var(--green); }
    .bar-seg-div { height: 100%; background: var(--gold); }
    .bar-seg-neg { height: 100%; background: var(--red); }
    .bar-labels { display: flex; gap: 8px; }
    .bar-label-item { font-size: 0.54rem; }
    .bar-pct { font-size: 0.7rem; font-weight: 700; width: 52px; flex-shrink: 0; text-align: right; font-family: 'DM Mono', monospace; }
    .stat-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .stat-card-label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
    .stat-card-val { font-size: 1.05rem; font-weight: 700; }
    .stat-card-sub { font-size: 0.65rem; margin-top: 2px; color: var(--muted); }

    /* DIVIDENDEN */
    .div-year-section { margin-bottom: 20px; }
    .div-year-title { font-size: 0.63rem; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .div-entry { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(53,59,85,0.5); }
    .div-entry:last-child { border-bottom: none; }
    .div-name { font-size: 0.8rem; color: var(--text); }
    .div-date { font-size: 0.58rem; color: var(--muted); margin-top: 1px; }
    .div-amount { font-size: 0.85rem; font-weight: 700; color: var(--gold); font-family: 'DM Mono', monospace; }
    .div-amount-net { font-size: 0.58rem; color: var(--muted); }
    .div-add-btn { width: 100%; background: none; border: 1px dashed var(--border2); border-radius: 10px; color: var(--muted); padding: 11px; font-size: 0.72rem; cursor: pointer; margin-top: 8px; font-family: inherit; transition: all 0.2s; }
    .div-add-btn:hover { border-color: var(--gold); color: var(--gold); }
    .div-summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; }

    /* SORT */
    .sort-bar { display: flex; gap: 5px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .sort-bar::-webkit-scrollbar { display: none; }
    .sort-chip { background: none; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); padding: 4px 10px; font-size: 0.58rem; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s; }
    .sort-chip.active { border-color: var(--teal); color: var(--teal); background: rgba(45,212,191,0.08); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; z-index: 200; backdrop-filter: blur(4px); }
    .modal { background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px 20px 0 0; padding: 22px 18px calc(var(--safe-bottom) + 22px); width: 100%; max-height: 92vh; overflow-y: auto; }
    .modal-title { font-size: 0.95rem; color: var(--gold); font-weight: 500; margin-bottom: 18px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .form-input, .form-select { background: var(--bg); border: 1px solid var(--border2); border-radius: 9px; padding: 10px 12px; color: var(--text); font-size: 0.88rem; font-family: inherit; outline: none; width: 100%; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-hint { font-size: 0.55rem; color: var(--muted); }
    .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
    .btn-cancel { flex: 1; background: none; border: 1px solid var(--border2); border-radius: 10px; color: var(--muted); padding: 11px; font-size: 0.82rem; cursor: pointer; font-family: inherit; }
    .btn-save { flex: 2; background: var(--gold); border: none; border-radius: 10px; color: var(--bg); padding: 11px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* TOAST */
    .toast { position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 20px; font-size: 0.75rem; color: var(--text); z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }

    .period-hint { font-size: 0.58rem; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
    .section-label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; margin-top: 18px; }

    /* EUR badge */
    .eur-note { font-size: 0.5rem; color: var(--teal); background: rgba(45,212,191,0.1); border-radius: 4px; padding: 1px 5px; margin-left: 5px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-label">Investitions-Übersicht</div>
      <div class="header-title">Portfolio <span>Dashboard</span></div>
    </div>
    <div class="header-right">
      <div class="total-val" id="header-total">—</div>
      <div class="price-status" id="price-status">⏳ Kurse laden…</div>
    </div>
  </div>
</div>

<!-- FAMILIEN TABS -->
<div class="family-nav">
  <button class="family-btn active" onclick="setFamily('rene')">Rene</button>
  <button class="family-btn" onclick="setFamily('nicole')">Nicole</button>
  <button class="family-btn" onclick="setFamily('jacob')">Jacob</button>
  <button class="family-btn" onclick="setFamily('mattis')">Mattis</button>
  <button class="family-btn" onclick="setFamily('lotta')">Lotta</button>
  <button class="family-btn" onclick="setFamily('tristan')">Tristan</button>
  <button class="family-btn" onclick="setFamily('alle')">Gesamt</button>
</div>

<!-- NAV TABS -->
<nav class="nav">
  <button class="nav-btn active" onclick="showTab('dashboard')">Übersicht</button>
  <button class="nav-btn" onclick="showTab('portfolio')">Portfolio</button>
  <button class="nav-btn" onclick="showTab('rendite')">Rendite</button>
  <button class="nav-btn" onclick="showTab('dividenden')">Dividenden</button>
</nav>

<div class="content">
  <div id="tab-dashboard"></div>
  <div id="tab-portfolio" style="display:none"></div>
  <div id="tab-rendite" style="display:none"></div>
  <div id="tab-dividenden" style="display:none"></div>
</div>

<!-- Position Modal -->
<div class="modal-overlay" id="modal-pos" style="display:none" onclick="if(event.target.id==='modal-pos')closeModal('modal-pos')">
  <div class="modal">
    <div class="modal-title" id="modal-pos-title">Neue Position</div>
    <div class="form-grid">
      <div class="form-group full"><label class="form-label">Name</label><input class="form-input" id="f-name" type="text" placeholder="z.B. Apple Inc." /></div>
      <div class="form-group"><label class="form-label">WKN</label><input class="form-input" id="f-wkn" type="text" /></div>
      <div class="form-group"><label class="form-label">Yahoo Ticker</label><input class="form-input" id="f-ticker" type="text" placeholder="AAPL" /><div class="form-hint">z.B. AAPL, BAS.DE, IWDA.AS</div></div>
      <div class="form-group"><label class="form-label">Typ</label><select class="form-select" id="f-typ"><option>Aktie</option><option>ETF</option></select></div>
      <div class="form-group"><label class="form-label">Familie</label><select class="form-select" id="f-familie"><option value="rene">Rene</option><option value="nicole">Nicole</option><option value="jacob">Jacob</option><option value="mattis">Mattis</option><option value="lotta">Lotta</option><option value="tristan">Tristan</option></select></div>
      <div class="form-group"><label class="form-label">Kaufdatum</label><input class="form-input" id="f-datum" type="date" /></div>
      <div class="form-group"><label class="form-label">Investiert (€)</label><input class="form-input" id="f-investiert" type="number" step="0.01" /></div>
      <div class="form-group"><label class="form-label">Anzahl Stück</label><input class="form-input" id="f-stueck" type="number" step="0.0001" /></div>
      <div class="form-group"><label class="form-label">Verkäufe (€)</label><input class="form-input" id="f-verkaufe" type="number" step="0.01" placeholder="0" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-pos')">Abbrechen</button>
      <button class="btn-save" onclick="savePosition()">Speichern</button>
    </div>
  </div>
</div>

<!-- Dividende Modal -->
<div class="modal-overlay" id="modal-div" style="display:none" onclick="if(event.target.id==='modal-div')closeModal('modal-div')">
  <div class="modal">
    <div class="modal-title">Dividende erfassen</div>

// ============================================================
// HILFSFUNKTIONEN
// ============================================================
function toEur(price, currency) {
  if (!price) return 0;
  if (!currency || currency === 'EUR') return price;
  if (currency === 'USD') return price / eurUsd;
  if (currency === 'CHF') return price / (eurUsd * 0.93); // Näherung
  return price;
}

function getPriceEur(ticker) {
  const p = prices[ticker];
  if (!p || !p.price) return null;
  return { priceEur: toEur(p.price, p.currency), priceOrig: p.price, currency: p.currency, change: p.change };
}

function calcYears(d) { return (TODAY - new Date(d)) / (1000*60*60*24*365.25); }

function getTotalDividenden(posId) {
  return dividenden.filter(d => d.posId === posId).reduce((s, d) => s + d.brutto, 0);
}

function calcAvgKaufkurs(inv) {
  if (!inv.kaufHistorie || inv.kaufHistorie.length === 0) {
    // Schätze aus investiert / stueck
    return inv.stueck > 0 ? inv.investiert / inv.stueck : 0;
  }
  const totalStueck = inv.kaufHistorie.reduce((s, k) => s + k.stueck, 0);
  const totalKosten = inv.kaufHistorie.reduce((s, k) => s + k.stueck * k.kurs, 0);
  return totalStueck > 0 ? totalKosten / totalStueck : 0;
}

function getAktuellerWert(inv) {
  const p = getPriceEur(inv.ticker);
  if (p && inv.stueck) return p.priceEur * inv.stueck;
  return 0;
}

function enrich(inv) {
  const aktuellerWert = getAktuellerWert(inv);
  const dividendenTotal = getTotalDividenden(inv.id);
  const total = aktuellerWert + inv.verkaufe + dividendenTotal;
  const gesamtPct = inv.investiert > 0 ? (total - inv.investiert) / inv.investiert * 100 : 0;
  const years = calcYears(inv.kaufDatum);
  const paPct = inv.investiert > 0 && years > 0.05
    ? (Math.pow(total / inv.investiert, 1/years) - 1) * 100
    : gesamtPct;
  const avgKaufkurs = calcAvgKaufkurs(inv);
  return { ...inv, aktuellerWert, dividenden: dividendenTotal, total, gesamtPct, paPct, years, avgKaufkurs };
}

const fmt = n => (n||0).toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';

const col = n => n >= 0 ? 'var(--green)' : 'var(--red)';
const fmtKurs = (n, cur) => {
  const s = (n||0).toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2});
  return cur && cur !== 'EUR' ? s + ' ' + cur : s + ' €';
};

function getFamilyData() {

function stats(list) {

}

function calcPeriodReturn(inv, mode) {
  const aktWert = getAktuellerWert(inv);
  const divTotal = getTotalDividenden(inv.id);
  const years = calcYears(inv.kaufDatum);
  const baseFactor = inv.investiert > 0 ? (aktWert + inv.verkaufe + divTotal) / inv.investiert : 1;
  const exp = mode === 'jahr' ? 1/Math.max(years,0.05) : 1/Math.max(years*12,0.5);
  const cagr = (Math.pow(Math.max(baseFactor,0.001), exp) - 1) * 100;
  const kursGewinn = aktWert + inv.verkaufe - inv.investiert;
  const kursGewinnPct = inv.investiert > 0 ? kursGewinn/inv.investiert*100 : 0;
  const divPct = inv.investiert > 0 ? divTotal/inv.investiert*100 : 0;
  const total2 = Math.abs(kursGewinnPct) + Math.abs(divPct);
  const kursFrac = total2 > 0 ? Math.abs(kursGewinnPct)/total2 : 1;
  const divFrac  = total2 > 0 ? Math.abs(divPct)/total2 : 0;
  return {
    total: cagr,
    kurs: cagr >= 0 ? cagr * kursFrac : cagr,
    div:  cagr >= 0 ? cagr * divFrac  : 0,
    isNeg: cagr < 0, years
  };
}

function renderRendite() {
  const withCalc = getFamilyData().map(inv => ({ ...inv, ...calcPeriodReturn(inv, renditeMode) }));
  const sorted = [...withCalc].sort((a,b) => b.total - a.total);
  const maxVal = Math.max(...sorted.map(i => Math.abs(i.total)), 1);
  const periodLabel = renditeMode==='jahr' ? 'p.a.' : 'pro Monat';

  const bars = sorted.map(inv => {
    const w = Math.min(Math.abs(inv.total)/maxVal*100, 100);
    const kW = inv.total>0 ? (Math.abs(inv.kurs)/Math.abs(inv.total))*w : 0;
    const dW = inv.total>0 ? (Math.abs(inv.div) /Math.abs(inv.total))*w : 0;
    return `<div class="bar-row">
      <div class="bar-name">${inv.name}</div>
      <div class="bar-track">
        <div class="bar-stacked">
          ${inv.isNeg
            ? `<div class="bar-seg-neg" style="width:${w}%"></div>`
            : `<div class="bar-seg-kurs" style="width:${kW}%"></div><div class="bar-seg-div" style="width:${dW}%"></div>`}
        </div>
        <div class="bar-labels">
          ${inv.isNeg
            ? `<span class="bar-label-item" style="color:var(--red)">${inv.total.toFixed(2)}%</span>`
            : `${inv.kurs>0?`<span class="bar-label-item" style="color:var(--green)">Kurs: ${inv.kurs.toFixed(1)}%</span>`:''}
               ${inv.div>0?`<span class="bar-label-item" style="color:var(--gold)">Div: ${inv.div.toFixed(1)}%</span>`:''}`}
        </div>
      </div>
      <div class="bar-pct" style="color:${col(inv.total)}">${fmtPct(inv.total)}</div>
    </div>`;
  }).join('');

  const aktien = withCalc.filter(i=>i.typ==='Aktie');
  const etfs   = withCalc.filter(i=>i.typ==='ETF');
  const avgA = aktien.length > 0 ? aktien.reduce((s,i)=>s+i.total,0)/aktien.length : 0;
  const avgE = etfs.length > 0 ? etfs.reduce((s,i)=>s+i.total,0)/etfs.length : 0;
  const best = sorted[0];

  document.getElementById('tab-rendite').innerHTML = `
    <div class="toggle-row">
      <button class="toggle-btn ${renditeMode==='monat'?'active':''}" onclick="setRenditeMode('monat')">Monat</button>
      <button class="toggle-btn ${renditeMode==='jahr'?'active':''}"  onclick="setRenditeMode('jahr')">Jahr</button>
    </div>
    <div class="period-hint">${renditeMode==='jahr'?'Annualisierte Rendite (CAGR)':'Monatliche Rendite (CMGR)'} — Kurssteigerung (grün) + Dividenden (gold). Alle Werte in Euro.</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Kurssteigerung</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Dividenden</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Verlust</div>
    </div>
    <div class="perf-card" style="padding:18px 14px">${bars}</div>
    <div class="stat-grid-2">
      <div class="stat-card"><div class="stat-card-label">Ø Aktien ${periodLabel}</div><div class="stat-card-val" style="color:var(--purple)">${fmtPct(avgA)}</div></div>
      <div class="stat-card"><div class="stat-card-label">Ø ETFs ${periodLabel}</div><div class="stat-card-val" style="color:var(--orange)">${fmtPct(avgE)}</div></div>
      ${best ? `<div class="stat-card" style="grid-column:1/-1">
        <div class="stat-card-label">Beste Position ${periodLabel}</div>
        <div class="stat-card-val" style="color:var(--green)">${best.name}</div>
        <div class="stat-card-sub" style="color:var(--green)">${fmtPct(best.total)}</div>
      </div>` : ''}
    </div>`;
}

function setRenditeMode(m) { renditeMode=m; renderRendite(); }

// DIVIDENDEN
// ============================================================
function renderDividenden() {
  const familyIds = new Set(getFamilyData().map(p=>p.id));
  const filteredDivs = dividenden.filter(d => familyIds.has(d.posId));

  const byYear = {};
  filteredDivs.forEach(d => {
    const y = new Date(d.datum).getFullYear();
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(d);
  });
  const years = Object.keys(byYear).sort((a,b) => b-a);
  const yearTotals = years.map(y => ({ year: y, total: byYear[y].reduce((s,d)=>s+d.brutto,0) }));
  const maxDiv = Math.max(...yearTotals.map(t=>t.total), 1);

  const summaryBars = yearTotals.map(t => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div style="width:40px;font-size:0.66rem;color:var(--muted);text-align:right">${t.year}</div>
      <div style="flex:1;background:var(--bg2);border-radius:4px;height:18px;overflow:hidden">
        <div style="height:100%;background:var(--gold);width:${t.total/maxDiv*100}%;border-radius:4px;opacity:0.85"></div>
      </div>
      <div style="width:80px;font-size:0.72rem;font-weight:700;color:var(--gold);text-align:right;font-family:'DM Mono',monospace">${fmt(t.total)}</div>
    </div>`).join('');

  const gesamtDiv = filteredDivs.reduce((s,d)=>s+d.brutto, 0);
  const gesamtNetto = filteredDivs.reduce((s,d)=>s+d.netto, 0);
  const gesamtSteuer = filteredDivs.reduce((s,d)=>s+d.steuer, 0);

  const sections = years.map(y => {
    const entries = byYear[y].sort((a,b) => new Date(b.datum)-new Date(a.datum));
    const yearTotal = entries.reduce((s,d)=>s+d.brutto,0);
    const rows = entries.map(d => {
      const pos = data.find(p=>p.id===d.posId);
      return `<div class="div-entry">
        <div>
          <div class="div-name">${pos?.name||'Unbekannt'}</div>
          <div class="div-date">${new Date(d.datum).toLocaleDateString('de-DE')}</div>
        </div>
        <div style="text-align:right">
          <div class="div-amount">${fmt(d.brutto)}</div>
          <div class="div-amount-net">Netto: ${fmt(d.netto)} · Steuer: ${fmt(d.steuer)}</div>
        </div>
        <button onclick="deleteDiv(${d.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;padding:0 0 0 8px">✕</button>
      </div>`;
    }).join('');
    return `<div class="div-year-section">
      <div class="div-year-title"><span>${y}</span><span>${fmt(yearTotal)}</span></div>
      ${rows}
    </div>`;
  }).join('');

  document.getElementById('tab-dividenden').innerHTML = `
    <div class="div-summary-card">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div><div class="kpi-label">Gesamt Brutto</div><div style="font-size:0.92rem;font-weight:700;color:var(--gold)">${fmt(gesamtDiv)}</div></div>
        <div><div class="kpi-label">Gesamt Netto</div><div style="font-size:0.92rem;font-weight:700;color:var(--green)">${fmt(gesamtNetto)}</div></div>
        <div><div class="kpi-label">Steuern</div><div style="font-size:0.92rem;font-weight:700;color:var(--red)">${fmt(gesamtSteuer)}</div></div>
      </div>
      <div style="font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px">Jährliche Dividenden</div>
      ${summaryBars}
    </div>
    <button class="div-add-btn" onclick="openDivModal(null)">+ Dividende erfassen</button>
    ${sections || '<div style="text-align:center;padding:20px;color:var(--muted);font-size:0.8rem">Keine Dividenden</div>'}`;
}

// DETAIL PANEL
// ============================================================
function toggleDetail(id, btn) {
  const panel = document.getElementById('detail-' + id);
  const arrow = document.getElementById('arrow-' + id);
  if (!panel) return;
  if (panel.classList.contains('open')) {
    panel.classList.remove('open'); panel.style.display = 'none';
    arrow.textContent = '▼'; expandedCards.delete(id);
  } else {
    panel.classList.add('open'); panel.style.display = 'block';
    arrow.textContent = '▲'; expandedCards.add(id);
  }
}

function fmtMktCap(n) {
  if (!n) return '—';
  if (n >= 1e12) return (n/1e12).toFixed(2) + ' Bio.';
  if (n >= 1e9)  return (n/1e9).toFixed(1) + ' Mrd.';
  if (n >= 1e6)  return (n/1e6).toFixed(1) + ' Mio.';
  return n.toLocaleString('de-DE');
}

function renderDetailPanel(inv) {
  const f = fundamentals[inv.ticker];
  if (!f) return '<div style="text-align:center;padding:14px;font-size:0.7rem;color:var(--muted)">⏳ Daten werden geladen</div>';
  const kgvColor = f.pe > 0 && f.pe < 15 ? 'var(--green)' : f.pe > 30 ? 'var(--red)' : 'var(--text)';
  const recColor = ['Strong Buy','Buy'].includes(f.rating) ? 'var(--green)' : ['Sell','Strong Sell'].includes(f.rating) ? 'var(--red)' : 'var(--gold)';
  const total = (f.buy||0) + (f.hold||0) + (f.sell||0);
  const analystBar = total > 0 ? `<div class="analyst-bar">
    <div class="analyst-buy" style="width:${(f.buy||0)/total*100}%"></div>
    <div class="analyst-hold" style="width:${(f.hold||0)/total*100}%"></div>
    <div class="analyst-sell" style="width:${(f.sell||0)/total*100}%"></div>
  </div>
  <div class="analyst-counts">
    <span style="color:var(--green)">Kaufen: ${f.buy||0}</span>
    <span style="color:var(--gold)">Halten: ${f.hold||0}</span>
    <span style="color:var(--red)">Verkaufen: ${f.sell||0}</span>
  </div>` : '';

  const e = earnings[inv.ticker];
  const earningsRows = e && e.length > 0
    ? e.slice(0,3).map(r => {
        const hitColor = r.actual != null ? (r.actual >= (r.estimate||0) ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
        return `<div class="earnings-row">
          <span style="color:var(--muted)">${r.date}</span>
          <span style="font-weight:600">${r.label}</span>
          <span style="color:${hitColor}">${r.actual != null ? r.actual.toFixed(2) + ' $' : '—'}</span>
        </div>`;
      }).join('')
    : '<div style="font-size:0.65rem;color:var(--muted)">Keine Daten verfügbar</div>';

  return `<div class="detail-grid">
    <div class="detail-item"><div class="detail-label">KGV (P/E)</div><div class="detail-val" style="color:${kgvColor}">${f.pe ? f.pe.toFixed(1) : '—'}</div></div>
    <div class="detail-item"><div class="detail-label">Marktkapitalisierung</div><div class="detail-val">${fmtMktCap(f.marketCap)}</div></div>
    <div class="detail-item"><div class="detail-label">Umsatz</div><div class="detail-val">${fmtMktCap(f.revenue)}</div></div>
    <div class="detail-item"><div class="detail-label">Nettogewinn</div><div class="detail-val" style="color:${f.netIncome>0?'var(--green)':'var(--red)'}">${fmtMktCap(f.netIncome)}</div></div>
  </div>
  <div class="analyst-wrap">
    <div class="detail-label">Analystenempfehlung</div>
    <div class="detail-val" style="color:${recColor};margin-top:3px">${f.rating || '—'}</div>
    ${analystBar}
  </div>
  <div class="earnings-wrap">
    <div class="earnings-title">Earnings / Quartalstermine</div>
    ${earningsRows}
  </div>`;
}

function showTab(tab) {
  activeTab = tab;
  ['dashboard','portfolio','rendite','dividenden'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  document.querySelectorAll('.nav-btn').forEach((btn,i) => {
    btn.classList.toggle('active', ['dashboard','portfolio','rendite','dividenden'][i]===tab);
  });
  renderActive();
}

function renderActive() {
  if (activeTab==='dashboard') renderDashboard();
  else if (activeTab==='portfolio') renderPortfolio();
  else if (activeTab==='rendite') renderRendite();
  else renderDividenden();
}

function setFilter(t) { filterTyp=t; renderPortfolio(); }
function setSort(k) {
  if (sortKey===k) sortAsc=!sortAsc; else { sortKey=k; sortAsc=false; }
  renderPortfolio();
}

function openEditPos(id) {
  const inv=data.find(i=>i.id===id); if(!inv) return;
  editPosId=id;
  document.getElementById('modal-pos-title').textContent='Position bearbeiten';
  document.getElementById('f-name').value=inv.name;
  document.getElementById('f-wkn').value=inv.wkn||'';
  document.getElementById('f-ticker').value=inv.ticker||'';
  document.getElementById('f-typ').value=inv.typ;
  document.getElementById('f-familie').value=inv.familie||'rene';
  document.getElementById('f-datum').value=inv.kaufDatum;
  document.getElementById('f-investiert').value=inv.investiert;
  document.getElementById('f-stueck').value=inv.stueck||'';
  document.getElementById('f-verkaufe').value=inv.verkaufe||0;
  document.getElementById('modal-pos').style.display='flex';
}

function savePosition() {
  const name=document.getElementById('f-name').value.trim();
  const datum=document.getElementById('f-datum').value;
  if(!name||!datum) return;
  const entry = {
    name, wkn:document.getElementById('f-wkn').value.trim(),
    ticker:document.getElementById('f-ticker').value.trim(),
    typ:document.getElementById('f-typ').value,
    familie:document.getElementById('f-familie').value,
    kaufDatum:datum,
    investiert:parseFloat(document.getElementById('f-investiert').value)||0,
    stueck:parseFloat(document.getElementById('f-stueck').value)||0,
    verkaufe:parseFloat(document.getElementById('f-verkaufe').value)||0,
    kaufHistorie:[],
  };
  if(editPosId) { data=data.map(i=>i.id===editPosId?{...i,...entry,id:editPosId,kaufHistorie:i.kaufHistorie}:i); }
  else { data.push({...entry,id:Date.now()}); }
  savePos(); closeModal('modal-pos'); renderActive(); updateHeaderTotal(); showToast('✓ Gespeichert');
}

function deletePos(id) {
  if(!confirm('Position und alle Dividenden löschen?')) return;
  data=data.filter(i=>i.id!==id);
  dividenden=dividenden.filter(d=>d.posId!==id);
  savePos(); saveDiv(); renderPortfolio(); updateHeaderTotal(); showToast('Gelöscht');
}

// ============================================================
// DIVIDENDE MODAL
// ============================================================
function openDivModal(posId) {
  const familyData = getFamilyData();
  const sel=document.getElementById('fd-position');
  sel.innerHTML=familyData.map(p=>`<option value="${p.id}" ${p.id===posId?'selected':''}>${p.name}</option>`).join('');
  document.getElementById('fd-datum').value=new Date().toISOString().slice(0,10);
  ['fd-brutto','fd-steuer','fd-netto'].forEach(id => document.getElementById(id).value='');
  document.getElementById('modal-div').style.display='flex';
}

document.addEventListener('input', e => {
  if(e.target.id==='fd-brutto'||e.target.id==='fd-steuer') {
    const b=parseFloat(document.getElementById('fd-brutto').value)||0;
    const s=parseFloat(document.getElementById('fd-steuer').value)||0;
    document.getElementById('fd-netto').value=(b-s).toFixed(2);
  }
});

function saveDividende() {
  const posId=parseInt(document.getElementById('fd-position').value);
  const datum=document.getElementById('fd-datum').value;
  const brutto=parseFloat(document.getElementById('fd-brutto').value)||0;
  const steuer=parseFloat(document.getElementById('fd-steuer').value)||0;
  if(!datum||brutto<=0) return;
  dividenden.push({ id:Date.now(), posId, datum, brutto, steuer, netto:brutto-steuer });
  saveDiv(); closeModal('modal-div'); renderActive(); showToast('✓ Dividende erfasst');
}

function deleteDiv(id) {
  dividenden=dividenden.filter(d=>d.id!==id);
  saveDiv(); renderDividenden(); showToast('Gelöscht');
}

function closeModal(id) { document.getElementById(id).style.display='none'; }

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ============================================================
// START
// ============================================================
initPrices();
renderDashboard();
</script>
</body>
</html>
