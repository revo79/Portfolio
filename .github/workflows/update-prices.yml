name: Update Stock Prices

on:
  schedule:
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch prices & update index.html
        env:
          FMP_KEY: ${{ secrets.FMP_KEY }}
        run: |
          python3 update_prices.py

      - name: Commit updated prices
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "bot@portfolio"
          git pull --rebase origin main
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-Update Kurse $(date '+%d.%m.%Y %H:%M')"
          git push
